# Auth routes — guest session creation and user history.
# Source: api/v1/auth/routes.yml
#
#   POST /api/v1/auth/guest       create or revalidate a guest session
#   GET  /api/v1/auth/me/history  paginated thread history for the caller
#   GET  /api/v1/auth/me/active   most recent in-progress thread
routes:
  - name: route-auth
    service: fastapi
    paths:
      - /api/v1/auth
    strip_path: false
    protocols: [http, https]
