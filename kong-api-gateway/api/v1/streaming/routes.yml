# Streaming routes — HTTP/SSE bridge to Redis Streams MQ.
# Source: api/v1/streaming/routes.yml
#
# All routes proxy to FastAPI which talks to Redis Streams internally.
# Kong never connects to Redis directly.
# All write paths (token publishing, lifecycle events) happen in-process;
# no external publish endpoint is exposed.
#
#   GET  /api/v1/streaming/sse/{stream_key}
#       SSE event source — streams new messages to the client in real-time.
#       response_buffering must be disabled so events flush through Kong.
#
#   GET  /api/v1/streaming/poll/{stream_key}
#       HTTP long-poll — returns a JSON batch of messages.
#       ?last_id=<msg_id>&count=<n>&block_ms=<ms>
#
#   GET  /api/v1/streaming/info/{stream_key}
#       Stream metadata (length, internal name).
#
# Rate-limiting is overridden at route level for all streaming endpoints.
# SSE and long-poll are long-lived or repeated GET connections that must not
# be throttled like short-lived API calls; the global 300/min cap is replaced
# with a very high limit so high-concurrency perf tests never hit 429s.
routes:
  - name: route-streaming-sse
    service: fastapi
    paths:
      - /api/v1/streaming/sse
    methods: [GET, OPTIONS]
    strip_path: false
    protocols: [http, https]
    # SSE requires response buffering disabled so events are flushed immediately
    # instead of being held in Kong's nginx buffer.
    response_buffering: false
    plugins:
      - name: rate-limiting
        config:
          minute: 10000
          hour: 500000
          policy: redis
          limit_by: ip
          hide_client_headers: false
          redis:
            host: "{REDIS_HOST}"
            port: {REDIS_PORT}
            database: 1
            timeout: 2000

  - name: route-streaming-poll
    service: fastapi
    paths:
      - /api/v1/streaming/poll
    methods: [GET, OPTIONS]
    strip_path: false
    protocols: [http, https]
    # Long-poll blocks until Redis Streams data arrives; disable buffering so
    # Kong flushes the response immediately when the upstream connection unblocks.
    response_buffering: false
    plugins:
      - name: rate-limiting
        config:
          minute: 10000
          hour: 500000
          policy: redis
          limit_by: ip
          hide_client_headers: false
          redis:
            host: "{REDIS_HOST}"
            port: {REDIS_PORT}
            database: 1
            timeout: 2000

  - name: route-streaming-info
    service: fastapi
    paths:
      - /api/v1/streaming/info
    methods: [GET, OPTIONS]
    strip_path: false
    protocols: [http, https]
    plugins:
      - name: rate-limiting
        config:
          minute: 10000
          hour: 500000
          policy: redis
          limit_by: ip
          hide_client_headers: false
          redis:
            host: "{REDIS_HOST}"
            port: {REDIS_PORT}
            database: 1
            timeout: 2000
