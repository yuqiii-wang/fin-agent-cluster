#
# Source fragments:
#   _shared/          upstreams, services, global plugins
#   api/v1/auth/      POST /api/v1/auth/*
#   api/v1/users/     POST|GET /api/v1/users/query/*
#   api/v1/stream/    GET /api/v1/stream/* (SSE)
