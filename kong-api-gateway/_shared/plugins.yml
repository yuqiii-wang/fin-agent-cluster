# Global Kong plugins — applied to every request regardless of route.
plugins:
  # CORS — allow browser clients (tighten origins in production)
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      headers:
        - Authorization
        - Content-Type
        - X-User-Token
        - Accept
        - Cache-Control
        - X-Requested-With
        - Last-Event-ID    # SSE reconnection — client sends this to resume a stream
      exposed_headers:
        - X-Auth-Token
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Request-size limiting — guards against large payload attacks
  - name: request-size-limiting
    config:
      allowed_payload_size: 10   # MB
      size_unit: megabytes

  # Rate limiting (local counter; switch to redis policy for multi-node)
  - name: rate-limiting
    config:
      minute: 300
      hour: 5000
      policy: local
      limit_by: ip
      hide_client_headers: false

  # Correlation ID — adds X-Request-ID to every response for traceability
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true
