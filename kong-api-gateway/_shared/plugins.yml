# Global Kong plugins — applied to every request regardless of route.
plugins:
  # CORS — allow browser clients (tighten origins in production)
  - name: cors
    config:
      origins:
        - "http://localhost:3000"   # Vite dev server
        - "http://localhost:8886"   # Kong Manager
        - "http://127.0.0.1:3000"
        - "http://127.0.0.1:8886"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      headers:
        - Authorization
        - Content-Type
        - X-User-Token
        - Accept
        - Cache-Control
        - X-Requested-With
        - Last-Event-ID    # SSE reconnection — client sends this to resume a stream
      exposed_headers:
        - X-Auth-Token
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Request-size limiting — guards against large payload attacks
  - name: request-size-limiting
    config:
      allowed_payload_size: 10   # MB
      size_unit: megabytes

  # Rate limiting — Redis policy for consistent counters across Kong workers/nodes
  - name: rate-limiting
    config:
      minute: 300
      hour: 5000
      policy: redis
      limit_by: ip
      hide_client_headers: false
      redis:
        host: "{REDIS_HOST}"
        port: {REDIS_PORT}
        database: 1       # DB 0 reserved for app; Kong uses DB 1
        timeout: 2000

  # Correlation ID — adds X-Request-ID to every response for traceability
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true

  # Prometheus — exposes /metrics on Kong's Admin API (port 8001).
  # Scraped by the prometheus container; per-route/service counters,
  # latency histograms, and upstream health are all available OSS.
  - name: prometheus
    config:
      status_code_metrics: true   # per-status-code request counters
      latency_metrics: true       # proxy / upstream / kong latency histograms
      bandwidth_metrics: true     # ingress / egress byte counters
      upstream_health_metrics: true  # upstream target health state

  # File log — writes one JSON line per request/response to /logs/kong.log
  # (volume-mounted from ./logs on the host).  Picked up by Promtail/Loki.
  # Logs: method, URI, status, latencies (kong/proxy/request ms), client IP,
  # upstream service/route names, X-Request-ID correlation header.
  - name: file-log
    config:
      path: /logs/kong.log
      reopen: false
