server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: fin-trading-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: fin-trading
          host: backend
          # *.log* matches both the active file (api.log) and rotated files (api.log.1, api.log.2 ...)
          # Excludes kong.log which has a different JSON schema (handled below).
          # [^k] = any first character that is NOT 'k', so kong.log is excluded.
          __path__: /logs/[^k]*.log*

    pipeline_stages:
      # Extract the base component name from the filename.
      # Works for both active (api.log) and rotated (api.log.1, api.log.2) files:
      # [^.]+ captures the first word only, \. log anchors to the .log boundary,
      # and any trailing rotation suffix (.1 .2 etc.) is ignored.
      - regex:
          source: filename
          expression: '/logs/(?P<source>[^.]+)\.log'

      - labels:
          source:

      # Parse JSON lines produced by backend.log_config.JsonFileFormatter
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            component: component
            message: message
            exception: exception

      # Promote parsed fields as Loki stream labels (low-cardinality only)
      - labels:
          level:
          component:

      # Structured metadata (high-cardinality — queryable but not indexed as stream labels)
      - structured_metadata:
          logger:

      # Parse the ISO timestamp from the JSON so Loki stores the correct event time
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000000"

      # Use the parsed message as the final log line
      - output:
          source: message

  # Kong access log — separate job because Kong file-log emits its own JSON
  # schema (request/response/latencies objects) different from our backend format.
  - job_name: kong-access-log
    static_configs:
      - targets:
          - localhost
        labels:
          job: kong
          host: kong
          source: kong
          __path__: /logs/kong.log*

    pipeline_stages:
      # Extract key Kong fields for structured querying in Loki/Grafana.
      - json:
          expressions:
            method:      request.method
            uri:         request.uri
            status:      response.status
            client_ip:   client_ip
            latency_req: latencies.request
            latency_kong: latencies.kong
            latency_proxy: latencies.proxy
            service_name: service.name
            route_name:  route.name
            # x-request-id contains dashes; JMESPath requires a quoted identifier
            # so the '-' is not misread as an arithmetic minus (tNumber token).
            request_id:  'request.headers."x-request-id"'

      - labels:
          method:
          status:
          service_name:

      - structured_metadata:
          uri:
          client_ip:
          latency_req:
          latency_kong:
          latency_proxy:
          route_name:
          request_id:
