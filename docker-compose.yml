services:
  postgres:
    image: postgres:18.3-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-P@ssw0rd123}
      POSTGRES_DB: ${POSTGRES_DB:-fin_trading}
    command: postgres -c max_connections=300
    ports:
      - "${POSTGRES_PORT:-6543}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2-trixie
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-3456}:6379"
    volumes:
      - redis_data:/data

  kong-migrations:
    image: kong/kong-gateway:3.12.0.5-20260415-rhel-fips
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: "5432"
      KONG_PG_USER: ${POSTGRES_USER:-admin}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD:-P@ssw0rd123}
      KONG_PG_DATABASE: ${KONG_DB:-kong}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kong-config-import:
    image: kong/kong-gateway:3.12.0.5-20260415-rhel-fips
    command: kong config db_import /etc/kong/kong.yml
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: "5432"
      KONG_PG_USER: ${POSTGRES_USER:-admin}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD:-P@ssw0rd123}
      KONG_PG_DATABASE: ${KONG_DB:-kong}
    volumes:
      - ./kong-api-gateway/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    restart: "no"

  kong:
    image: kong/kong-gateway:3.12.0.5-20260415-rhel-fips
    restart: unless-stopped
    extra_hosts:
      # Resolve host.docker.internal on Linux (automatic on Docker Desktop only).
      - "host.docker.internal:host-gateway"
    depends_on:
      kong-config-import:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: "5432"
      KONG_PG_USER: ${POSTGRES_USER:-admin}
      KONG_PG_PASSWORD: ${POSTGRES_PASSWORD:-P@ssw0rd123}
      KONG_PG_DATABASE: ${KONG_DB:-kong}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002"
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      # Tell Kong Manager which external URLs to use from the browser
      KONG_ADMIN_GUI_URL: "http://localhost:${KONG_MANAGER_PORT:-8886}"
      KONG_ADMIN_GUI_API_URL: "http://localhost:${KONG_ADMIN_PORT:-8887}"
      KONG_PG_POOL_SIZE: "5"
      KONG_PG_BACKLOG: "10"
      KONG_NGINX_WORKER_PROCESSES: "2"
      KONG_MEM_CACHE_SIZE: "256m"
      KONG_DB_UPDATE_FREQUENCY: "10"
      KONG_LOG_LEVEL: debug
      KONG_NGINX_PROXY_ERROR_LOG: /dev/stderr debug
    ports:
      - "${KONG_PROXY_PORT:-8888}:8000"
      - "${KONG_PROXY_SSL_PORT:-8443}:8443"
      - "${KONG_ADMIN_PORT:-8887}:8001"
      - "${KONG_MANAGER_PORT:-8886}:8002"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 60s
      timeout: 10s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.11.2
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle       # allow hot-reload via POST /-/reload
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9988}:9090"
    depends_on:
      kong:
        condition: service_healthy

  loki:
    image: grafana/loki:main-9c3bd87
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki


  promtail:
    image: grafana/promtail:3.6.10
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - ./logs:/logs:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana-oss:13.0.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3210}:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
